<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>分镜示例库</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🎬 分镜示例库</h1>
    <p>按构图 / 镜头类型浏览，点击卡片查看示例与说明。</p>
  </header>

  <section class="toolbar">
    <input id="search" placeholder="搜索：如 三角构图 / 左三分之一 / 特写" />
    <select id="categoryFilter">
      <option value="all">全部分类</option>
      <option value="构图">构图</option>
      <option value="机位">机位</option>
      <option value="景别">景别</option>
      <option value="叙事">叙事</option>
    </select>
  </section>

  <main id="grid" class="grid"></main>

  <dialog id="modal">
    <article>
      <button id="closeBtn">关闭</button>
      <h2 id="mTitle"></h2>
      <img id="mImg" alt="示例图" />
      <p><b>分类：</b><span id="mCat"></span></p>
      <p><b>类型标签：</b><span id="mTags"></span></p>
      <p><b>说明：</b><span id="mDesc"></span></p>
      <p><b>参考来源：</b><a id="mSource" href="#" target="_blank" rel="noopener">查看原图</a></p>
    </article>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
